name: hifza_expense_tracker
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  http: ^1.2.0 # REST API communication support packet

  # Charts package
  syncfusion_flutter_charts: ^29.1.41

  # Hive local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Date formatting
  intl: ^0.20.2

  # Storage paths
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Recommended lint rules
  flutter_lints: ^5.0.0

  # Hive code generator
  hive_generator: ^2.0.1

  # Generates files automatically
  build_runner: ^2.4.15
  #  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4 # <-- YAHAN SE HASH '#' HATA DIYA HAI

# The following section is specific to Flutter.
flutter:

  # Ensures that the Material Icons font is included
  uses-material-design: true

  # Assets
  assets:
    - images/

  # Fonts
  fonts:
    - family: s
      fonts:
        - asset: fonts/Roboto-Regular.ttf

# Icon configurations generator configurations blocks
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png" # <-- assets ko badal kar 'images' kar diya jo aapke folder ka asli naam hai
  min_sdk_android: 21
